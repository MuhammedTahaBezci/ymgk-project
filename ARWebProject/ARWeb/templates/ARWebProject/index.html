<!DOCTYPE html>
<html lang="tr">
{% load static %}

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobil Uygulama Çaylaklık</title>
  <link rel="stylesheet" href="../../static/ARWebProject/style.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Logom</div>
    <div class="nav-buttons">
      {% if session_active %}
      <button><a href="http://127.0.0.1:8000/logout" class="login">Çıkış Yap</a></button>
      {% else %}
      <button><a href="http://127.0.0.1:8000/login/" class="login">Giriş Yap</a></button>
      <button><a href="http://127.0.0.1:8000/register" class="register">Kayıt Ol</a></button>
      {% endif %}
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <img src="../../static/ARWebProject/arkaplan.jpg" alt="Cocuk Resmi" class="img">
    <div class="intro">
      <h1>Mobil Uygulama Çaylaklık</h1>
      <p>Mobil sürümümüzle tanışın ve uygulamamızın sunduğu özellikleri keşfedin.</p>
    </div>
    <div class="app-preview">
      <div class="card">

        <div class="btn1"></div>
        <div class="btn2"></div>
        <div class="btn3"></div>
        <div class="btn4"></div>
        <div class="card-int">
          <div class="hello">Hello
            <span class="hidden">uiverse</span>
          </div>
        </div>
        <div class="top">
          <div class="camera">
            <div class="int"></div>
          </div>
          <div class="speaker"></div>
        </div>
      </div>
    </div>
  </main>


  <!-- Footer -->
  <footer class="footer">
    <p>Bizi takip edin:</p>
    <div class="social-icons">
      <a href="#" class="icon">Facebook</a>
      <a href="#" class="icon">Instagram</a>
      <a href="#" class="icon">Twitter</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
